<div class="relative flex h-full flex-col items-center justify-center p-8">

  <div class="mb-10 text-center">
    <h2 class="text-3xl font-bold tracking-tight text-slate-900 dark:text-white">Upload Document</h2>
    <p class="mx-auto mt-2 max-w-md text-sm text-slate-500">Upload an RFP payload for AI extraction. The document will be securely routed to the designated pipeline.</p>
  </div>

  <div class="relative w-full max-w-lg overflow-hidden rounded-2xl border border-slate-200 bg-white p-8 shadow-xl dark:border-slate-700 dark:bg-slate-800">

    <div *ngIf="isUploading" class="animate-fade-in absolute inset-0 z-10 flex flex-col items-center justify-center bg-white/80 backdrop-blur-sm dark:bg-slate-900/80">
      <svg class="mb-4 h-10 w-10 animate-spin text-blue-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
      <p class="text-sm font-semibold uppercase tracking-widest text-slate-900 dark:text-white">Executing Protocol...</p>
    </div>

    <div class="space-y-6">

      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="mb-2 block text-xs font-semibold uppercase tracking-wider text-slate-500">Priority</label>
          <select [(ngModel)]="priority" class="w-full cursor-pointer rounded-lg border border-slate-200 bg-slate-50 px-3 py-2.5 text-sm text-slate-900 outline-none transition-shadow focus:ring-2 focus:ring-blue-500 dark:border-slate-700 dark:bg-slate-900 dark:text-white">
            <option value="Low">Low</option>
            <option value="Normal">Normal</option>
            <option value="Critical">Critical</option>
          </select>
        </div>
        <div>
          <label class="mb-2 block text-xs font-semibold uppercase tracking-wider text-slate-500">Department</label>
          <select [(ngModel)]="department" class="w-full cursor-pointer rounded-lg border border-slate-200 bg-slate-50 px-3 py-2.5 text-sm text-slate-900 outline-none transition-shadow focus:ring-2 focus:ring-blue-500 dark:border-slate-700 dark:bg-slate-900 dark:text-white">
            <option value="Sales">Sales</option>
            <option value="Engineering">Engineering</option>
            <option value="Legal">Legal</option>
          </select>
        </div>
      </div>

      <div>
        <label class="mb-2 block text-xs font-semibold uppercase tracking-wider text-slate-500">Project Identifier</label>
        <input type="text" [(ngModel)]="newProjectTitle" class="w-full rounded-lg border border-slate-200 bg-slate-50 px-4 py-3 text-sm text-slate-900 outline-none transition-shadow focus:ring-2 focus:ring-blue-500 dark:border-slate-700 dark:bg-slate-900 dark:text-white" placeholder="e.g., Q3 Marketing RFP">
      </div>

      <div>
        <label class="mb-2 block text-xs font-semibold uppercase tracking-wider text-slate-500">Payload (PDF, Max 5MB)</label>
        <input type="file" accept=".pdf" (change)="onFileSelected($event)" class="w-full cursor-pointer rounded-lg border border-slate-200 bg-slate-50 p-1.5 text-sm text-slate-500 transition-colors file:mr-4 file:rounded-lg file:border-0 file:bg-blue-50 file:px-4 file:py-2.5 file:text-blue-700 dark:border-slate-700 dark:bg-slate-900 dark:text-slate-400 hover:file:bg-blue-100 dark:file:bg-blue-900/30 dark:file:text-blue-400 dark:hover:file:bg-blue-900/50">
      </div>

      <div *ngIf="fileError" class="flex items-center rounded-lg border border-red-200 bg-red-50 p-3 text-xs text-red-600 dark:border-red-800 dark:bg-red-900/20 dark:text-red-400">
        <svg class="mr-2 h-4 w-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
        {{ fileError }}
      </div>

      <button (click)="onUpload()" [disabled]="!newProjectTitle || !selectedFile || isUploading || fileError"
              class="mt-4 flex w-full items-center justify-center rounded-xl bg-blue-600 px-4 py-3.5 font-semibold text-white shadow-lg transition-all hover:bg-blue-700 hover:shadow-blue-500/30 active:scale-[0.98] disabled:bg-slate-200 disabled:text-slate-400 dark:disabled:bg-slate-700">
        Initialize Extraction
      </button>
    </div>
  </div>

  <div *ngIf="showSuccessToast" class="animate-fade-in-up absolute bottom-10 flex items-center rounded-xl border border-slate-700 bg-slate-900/90 px-6 py-4 text-white shadow-2xl backdrop-blur-md">
    <div class="mr-3 flex h-8 w-8 items-center justify-center rounded-full border border-green-500/30 bg-green-500/20">
      <svg class="h-4 w-4 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
    </div>
    <div>
      <p class="text-sm font-bold">Payload Accepted</p>
      <p class="text-xs text-slate-400">The document is now processing in the vault.</p>
    </div>
  </div>

</div>
