<div class="flex min-h-screen items-center justify-center bg-gray-900">

  <div class="w-full max-w-md rounded-xl border border-gray-700 bg-gray-800 p-8 shadow-2xl">

    <div class="mb-8 text-center">
      <h1 class="text-4xl font-bold tracking-wider text-white">Axes<span class="text-blue-500"> AI</span></h1>
      <p class="mt-2 text-sm text-gray-400">Enterprise RFP Extraction Engine</p>
    </div>

    <div *ngIf="errorMessage" class="mb-6 rounded-lg border border-red-500 bg-red-900/50 px-4 py-2 text-center text-sm text-red-200">
      {{ errorMessage }}
    </div>

    <form (ngSubmit)="onSubmit()" class="space-y-6">

      <div>
        <label class="mb-2 block text-sm font-medium text-gray-300">Username</label>
        <input type="text"
               name="username"
               [(ngModel)]="credentials.username"
               required
               class="w-full rounded-lg border border-gray-600 bg-gray-900 px-4 py-3 text-white transition-colors focus:border-blue-500 focus:outline-none focus:ring-1 focus:ring-blue-500"
               placeholder="Enter your username">
      </div>

      <div>
        <label class="mb-2 block text-sm font-medium text-gray-300">Password</label>
        <input type="password"
               name="password"
               [(ngModel)]="credentials.password"
               required
               class="w-full rounded-lg border border-gray-600 bg-gray-900 px-4 py-3 text-white transition-colors focus:border-blue-500 focus:outline-none focus:ring-1 focus:ring-blue-500"
               placeholder="••••••••">
      </div>

      <button type="submit"
              class="w-full rounded-lg bg-blue-600 px-4 py-3 font-bold text-white transition-colors hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 focus:ring-offset-gray-800">
        Access Portal
      </button>
    </form>
    <div class="mt-6 border-t border-gray-700 pt-6">
      <button routerLink="/register" type="button" class="w-full rounded-lg border border-gray-600 bg-transparent px-4 py-3 font-bold text-gray-300 transition-colors hover:border-blue-500 hover:text-blue-400 focus:outline-none">
        Create a New Account
      </button>
    </div>
  </div>
</div>
